backend:
  name: github
  repo: caominshan/rubato
  branch: main
  base_url: https://rubato-oauth.carpediem050414.workers.dev
  auth_endpoint: auth

local_backend: false

collections:
  - name: exhibitions
    label: Exhibitions
    label_singular: Exhibition
    folder: content/exhibitions
    create: true
    extension: json
    format: json
    slug: "{{slug}}"
    fields:
      - { name: id, label: ID, widget: string, required: false }
      - { name: title, label: Title, widget: string }
      - name: region
        label: Region
        widget: select
        options:
          - { label: Domestic, value: domestic }
          - { label: International, value: international }
      - { name: country, label: Country, widget: string, required: false }
      - { name: city, label: City, widget: string, required: false }
      - { name: date, label: Date, widget: string, required: false }
      - name: status
        label: Status
        widget: select
        options:
          - { label: Seen, value: done }
          - { label: Unseen, value: undone }
        default: undone
      - { name: description, label: Description, widget: text, required: false }
      - { name: cover, label: Cover URL, widget: string, required: false }
      - name: gallery
        label: Gallery URLs
        widget: list
        required: false
        field: { name: image, label: Image URL, widget: string }

  - name: books
    label: Books
    label_singular: Book
    folder: content/books
    create: true
    extension: json
    format: json
    slug: "{{slug}}"
    fields:
      - { name: id, label: ID, widget: string, required: false }
      - { name: title, label: Title, widget: string }
      - { name: author, label: Author, widget: string, required: false }
      - { name: country, label: Country, widget: string, required: false }
      - { name: language, label: Language, widget: string, required: false }
      - name: status
        label: Status
        widget: select
        options:
          - { label: Read, value: done }
          - { label: Unread, value: undone }
        default: undone
      - { name: description, label: Description, widget: text, required: false }
      - { name: cover, label: Cover URL, widget: string, required: false }
      - name: gallery
        label: Gallery URLs
        widget: list
        required: false
        field: { name: image, label: Image URL, widget: string }
