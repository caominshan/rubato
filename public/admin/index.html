<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Rubato · Admin</title>
    <style>
      :root {
        --bg: #0b0a0d;
        --panel: rgba(255, 255, 255, 0.06);
        --panel-2: rgba(255, 255, 255, 0.10);
        --border: rgba(255, 255, 255, 0.14);
        --text: rgba(255, 255, 255, 0.86);
        --muted: rgba(255, 255, 255, 0.52);
        --accent: #7b4bd1;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: radial-gradient(circle at 30% 20%, rgba(123, 75, 209, 0.20), transparent 55%),
          radial-gradient(circle at 70% 80%, rgba(255, 255, 255, 0.07), transparent 55%),
          linear-gradient(180deg, #09080b 0%, #0b0a0d 100%);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
      }

      #nc-root {
        height: 100%;
      }

      a {
        color: rgba(210, 194, 255, 0.92);
      }

      ::selection {
        background: rgba(123, 75, 209, 0.40);
      }

      .css-1x0wttc,
      .css-18nwh2f,
      .css-1hvrv7x {
        background: transparent !important;
      }

      .css-1f3xv4v,
      .css-1l1q3le,
      .css-5zkbbf {
        background: var(--panel) !important;
        border: 1px solid var(--border) !important;
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        box-shadow: 0 20px 70px rgba(0, 0, 0, 0.50) !important;
      }

      .css-1h3m5ad,
      .css-1g1qvmy,
      .css-1d6f4v0 {
        color: var(--text) !important;
      }

      .css-1o5c6k7,
      .css-b6m4k0,
      .css-1bpyqyu {
        color: var(--muted) !important;
      }

      .css-1c2h6cz,
      .css-1c9m4m0,
      .css-1r9o0c0 {
        background: rgba(123, 75, 209, 0.20) !important;
        border: 1px solid rgba(123, 75, 209, 0.32) !important;
        box-shadow: 0 16px 40px rgba(123, 75, 209, 0.18) !important;
      }
    </style>
  </head>
  <body>
    <div id="nc-root"></div>
    <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
  </body>
</html>
